name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: windows-latest
    env:
      JWT_SECRET: "ci-secret-token-uses-more-than-32-characters"
      AUTH_ADMIN_PASS: "ci-admin-password"
      AUTH_REVOCATION_FAIL_MODE: "open"
      RESEARCH_CACHE_ENABLED: "false"
      MARKET_DATA_DISABLE_PROXY: "true"
      QMT_AUTO_DOWNLOAD: "false"
      QMT_FINANCIAL_AUTO_DOWNLOAD: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Compile changed runtime modules
        run: |
          python -m py_compile main.py
          python -m py_compile services/llm/json_guard.py services/llm/deepseek_client.py
          python -m py_compile apps/api/auth/security.py apps/api/auth/dependencies.py apps/api/limiter.py
          python -m py_compile services/orchestrator/single_asset_research.py

      - name: Run targeted tests
        run: |
          python -m pytest tests/test_cli.py tests/test_llm_json_guard.py tests/test_security_config.py tests/test_provider_errors.py tests/test_report_pipeline.py tests/test_valuation_percentile.py tests/test_scoring_engine.py -q -p no:cacheprovider
