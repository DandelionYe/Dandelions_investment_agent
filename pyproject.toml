[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-p no:cacheprovider"

[tool.ruff]
target-version = "py313"
line-length = 100
exclude = [
    ".venv",
    ".local",
    ".pytest_cache",
    "storage",
    "archives",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "services"]
